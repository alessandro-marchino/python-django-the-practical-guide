{% extends "reviews/base.html" %}

{% block title %}All Reviews{% endblock title %}

{% block content %}
<ul>
  {% for review in reviews %}
    <li>
      <a href="{% url "single-review" review.id %}">{{ review.user_name}} ({{ review.rating}})</a>
    </li>
  {% endfor %}
</ul>
{% endblock content %}
